<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章 · 无形识局</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .filter-bar {
      display: flex;
      flex-wrap: wrap; gap: 8px; justify-content: center;
      margin-bottom: var(--space-2xl);
    }
    .filter-btn {
      padding: 5px 16px; border-radius: 20px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-secondary); font-size: 0.8rem; cursor: pointer;
      transition: all 0.2s; font-family: inherit;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .article-list { list-style: none; padding: 0; margin: 0; }
    .article-list-item {
      display: flex; gap: var(--space-lg); padding: var(--space-lg) 0;
      border-bottom: 1px solid var(--border);
    }
    .article-list-item:last-child { border-bottom: none; }
    .article-number {
      font-size: 2rem; font-weight: 300; color: var(--accent);
      opacity: 0.5; line-height: 1; min-width: 48px;
    }
    .article-list-content { flex: 1; }
    .article-list-title {
      font-size: 1.05rem; font-weight: 500; color: var(--text-primary);
      text-decoration: none; line-height: 1.5;
    }
    .article-list-title:hover { color: var(--accent); }
    .article-list-meta { font-size: 0.75rem; color: var(--text-tertiary); margin: 4px 0 8px; }
    .article-list-excerpt { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.6; }
    @media (max-width: 600px) {
      .article-list-item { flex-direction: column; gap: var(--space-sm); }
      .article-number { font-size: 1.2rem; min-width: auto; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-brand"><span class="seal">印</span>无形识局</a>
      <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="articles.html" class="active">文章</a></li>
        <li><a href="family.html">三姐妹</a></li>
        <li><a href="about.html">关于</a></li>
        <li><a href="https://wushu-wuxing.github.io/compute-infrastructure-insights/" target="_blank">产业洞察</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <div class="container-narrow">
      <h1 style="text-align: center; margin-bottom: var(--space-md);">文章 · 识局录</h1>
      <p style="text-align: center; color: var(--text-tertiary); margin-bottom: var(--space-2xl);">所思所悟，所历所见，皆录于此。</p>

      <div class="filter-bar" id="filter-bar">
        <button class="filter-btn active" data-filter="all">全部</button>
        <button class="filter-btn" data-filter="philosophy">哲学</button>
        <button class="filter-btn" data-filter="investment">投资</button>
        <button class="filter-btn" data-filter="technology">科技</button>
        <button class="filter-btn" data-filter="family">家族</button>
        <button class="filter-btn" data-filter="misc">杂谈</button>
      </div>

      <ul class="article-list" id="article-list">
        <li class="text-center" style="color: var(--text-tertiary); padding: var(--space-2xl);">加载中...</li>
      </ul>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-links">
        <a href="index.html">首页</a>
        <a href="articles.html">文章</a>
        <a href="family.html">三姐妹</a>
        <a href="about.html">关于</a>
        <a href="https://wushu-wuxing.github.io/compute-infrastructure-insights/" target="_blank">产业洞察站</a>
        <a href="https://github.com/wushu-wuxing" target="_blank">GitHub</a>
      </div>
      <p><span class="seal">印</span> 无形识局 · 大象无形 · 由三姐妹共筑</p>
    </div>
  </footer>

  <script src="assets/js/speech-fix.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/content.js"></script>
  <script>
    /* 全内联文章渲染 — 不依赖任何外部函数的渲染 */
    window.articlesPage = {
      filter: "all",
      hasInitialized: false
    };

    function articlesInit() {
      var list = document.getElementById("article-list");
      if (!list) return;

      // 1) 检查 getArticles 是否可用
      if (typeof getArticles !== "function") {
        list.innerHTML = '<li class="text-center" style="color:var(--text-tertiary);padding:var(--space-2xl)">数据加载中...</li>';
        return;
      }

      // 2) 获取文章
      var all = getArticles();
      if (!all || all.length === 0) {
        list.innerHTML = '<li class="text-center" style="color:var(--text-tertiary);padding:var(--space-2xl)">尚无文章，敬请期待。</li>';
        return;
      }

      // 3) 使用 content.js 的 getArticles() 和 renderArticleListItem()
      //    但直接在全局作用域调用 — 不在 IIFE 闭包里跑
      articlesRender(all);
    }

    function articlesRender(all) {
      var list = document.getElementById("article-list");
      if (!list) return;

      var lang = (typeof currentLang !== "undefined" && currentLang) ? currentLang : "zh";

      // 过滤
      var filtered = (articlesPage.filter === "all")
        ? all
        : all.filter(function(a) { return a.category === articlesPage.filter; });

      if (filtered.length === 0) {
        list.innerHTML = '<li class="text-center" style="color:var(--text-tertiary);padding:var(--space-2xl)">该分类暂无文章。</li>';
        return;
      }

      // 逐条渲染 — 每条单独 try/catch
      var html = "";
      for (var i = 0; i < filtered.length; i++) {
        try {
          html += renderArticleListItem(filtered[i], lang);
        } catch(e) {
          html += '<li class="article-list-item"><div class="article-number">' + filtered[i].id + '</div><div class="article-list-content"><p style="color:var(--text-tertiary)">渲染出错: ' + e.message + '</p></div></li>';
        }
      }
      list.innerHTML = html;
    }

    // 筛选按钮
    function articlesBindFilters() {
      var bar = document.getElementById("filter-bar");
      if (!bar) return;
      var btns = bar.querySelectorAll(".filter-btn");
      for (var i = 0; i < btns.length; i++) {
        btns[i].onclick = (function(btn) {
          return function() {
            var bar2 = document.getElementById("filter-bar");
            var bs = bar2.querySelectorAll(".filter-btn");
            for (var j = 0; j < bs.length; j++) bs[j].classList.remove("active");
            btn.classList.add("active");
            articlesPage.filter = btn.getAttribute("data-filter") || "all";
            var all = getArticles();
            if (all) articlesRender(all);
          };
        })(btns[i]);
      }
    }

    // 语言切换监听
    window.addEventListener("langchange", function() {
      var all = getArticles();
      if (all) articlesRender(all);
    });

    // 启动
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", function() {
        articlesBindFilters();
        setTimeout(articlesInit, 50);
      });
    } else {
      articlesBindFilters();
      setTimeout(articlesInit, 50);
    }
  </script>
</body>
</html>
