<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章 · 无形识局</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-brand"><span class="seal">印</span>无形识局</a>
      <ul class="nav-links">
        <li><a href="index.html" data-i18n="nav_home">首页</a></li>
        <li><a href="articles.html" class="active" data-i18n="nav_articles">文章</a></li>
        <li><a href="family.html" data-i18n="nav_family">三姐妹</a></li>
        <li><a href="about.html" data-i18n="nav_about">关于</a></li>
        <li><button class="lang-switch" data-lang="zh" onclick="setLang('zh')">中</button></li>
        <li><button class="lang-switch" data-lang="en" onclick="setLang('en')">EN</button></li>
      </ul>
    </div>
  </nav>

  <main>
    <div class="container-narrow">
      <h1 style="text-align: center; margin-bottom: var(--space-md);" data-i18n="articles_title">文章 · 识局录</h1>
      <p style="text-align: center; color: var(--text-tertiary); margin-bottom: var(--space-2xl);" data-i18n="articles_subtitle">所思所悟，所历所见，皆录于此。</p>

      <ul class="article-list" id="article-list"></ul>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-links">
        <a href="index.html" data-i18n="nav_home">首页</a>
        <a href="articles.html" data-i18n="nav_articles">文章</a>
        <a href="family.html" data-i18n="nav_family">三姐妹</a>
        <a href="about.html" data-i18n="nav_about">关于</a>
        <a href="https://github.com/wushu-wuxing" target="_blank" data-i18n="footer_github">GitHub</a>
      </div>
      <p><span class="seal">印</span> <span data-i18n="footer_copy">无形识局 · 大象无形</span> · <span data-i18n="footer_made">由三姐妹共筑</span></p>
    </div>
  </footer>

  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/content.js"></script>
  <script>
    function renderArticleList() {
      const list = document.getElementById("article-list");
      if (!list) return;
      const all = getArticles();
      if (all.length === 0) {
        list.innerHTML = '<li class="text-center" style="color: var(--text-tertiary); padding: var(--space-2xl);" data-i18n="articles_empty">尚无文章，敬请期待。</li>';
        return;
      }
      list.innerHTML = all.map(a => renderArticleListItem(a, currentLang)).join("");
    }

    window.addEventListener("langchange", renderArticleList);
    document.addEventListener("DOMContentLoaded", renderArticleList);
  </script>
</body>
</html>
